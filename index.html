<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NPDL 評量設計工作室</title>
    <script>
      (() => {
        const recoveryKey = "npdl_asset_recovery_at";
        const recoverableMessage =
          /failed to fetch dynamically imported module|error loading dynamically imported module|importing a module script failed/i;

        const recover = () => {
          const now = Date.now();
          const lastRecoveryAt = Number(sessionStorage.getItem(recoveryKey) || "0");
          if (now - lastRecoveryAt < 30_000) return;

          sessionStorage.setItem(recoveryKey, String(now));
          const nextUrl = new URL(window.location.href);
          nextUrl.searchParams.set("_asset_reload", String(now));
          window.location.replace(nextUrl.toString());
        };

        window.addEventListener("vite:preloadError", (event) => {
          event.preventDefault();
          recover();
        });
        window.addEventListener("unhandledrejection", (event) => {
          const message =
            event.reason instanceof Error
              ? event.reason.message
              : String(event.reason ?? "");
          if (!recoverableMessage.test(message)) return;
          event.preventDefault();
          recover();
        });
        window.addEventListener(
          "error",
          (event) => {
            const failedModule =
              event.target instanceof HTMLScriptElement &&
              event.target.type === "module";
            if (failedModule || recoverableMessage.test(event.message)) recover();
          },
          true,
        );

        const deployBuildKey = "npdl_deploy_build_id";
        void fetch(new URL("deploy-config.json", window.location.href), {
          cache: "no-store",
        })
          .then((response) => (response.ok ? response.json() : null))
          .then((config) => {
            const remoteBuildId = String(config?.buildId ?? "").trim();
            if (!remoteBuildId) return;
            const localBuildId = sessionStorage.getItem(deployBuildKey);
            if (localBuildId && localBuildId !== remoteBuildId) {
              sessionStorage.setItem(deployBuildKey, remoteBuildId);
              const nextUrl = new URL(window.location.href);
              nextUrl.searchParams.set("_deploy_reload", remoteBuildId);
              window.location.replace(nextUrl.toString());
              return;
            }
            sessionStorage.setItem(deployBuildKey, remoteBuildId);
          })
          .catch(() => {});
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
